<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Abersoch Conditions</title>
<meta name="theme-color" content="#0f172a">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/414/414974.png">

<style>
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin:0; background:linear-gradient(#0f172a,#020617); color:#e2e8f0; }
.container { padding:16px; max-width:520px; margin:auto; }
h1 { font-size:24px; margin-bottom:12px; }
.card { background:#1e293b; padding:16px; border-radius:18px; margin-bottom:14px; box-shadow:0 10px 25px rgba(0,0,0,0.3);} 
.row { display:flex; justify-content:space-between; margin:6px 0; }
.traffic { text-align:center; font-size:20px; padding:12px; border-radius:14px; font-weight:bold; }
.good { background:#166534; }
.ok { background:#854d0e; }
.bad { background:#7f1d1d; }
.small { opacity:0.7; font-size:13px; }
button { width:100%; padding:12px; margin-top:8px; border:none; border-radius:12px; font-size:16px; }
.btn { background:#334155; color:white; }
.modal { position:fixed; bottom:-100%; left:0; right:0; background:#1e293b; padding:20px; border-top-left-radius:20px; border-top-right-radius:20px; transition:0.3s; }
.modal.open { bottom:0; }
.modal a { display:block; padding:10px 0; color:#38bdf8; text-decoration:none; }
canvas { width:100%; }
.map { position:relative; }
.map img { width:100%; border-radius:12px; }
.arrow { position:absolute; font-size:24px; }
.wind { top:20%; left:20%; }
.wave { bottom:20%; right:20%; }
</style>
</head>
<body>
<div class="container">
<h1>🌊 Abersoch Conditions</h1>


<div id="status" class="traffic">Loading...</div>

<div class="card">
<div class="row"><div>🌡 Temp</div><div id="temp">-</div></div>
<div class="row"><div>☁️ Weather</div><div id="weather">-</div></div>
<div class="row"><div>💨 Wind (kn)</div><div id="wind">-</div></div>
<div class="row"><div>🌊 Waves</div><div id="waves">-</div></div>
<div class="small" id="bestTime"></div>
</div>

<div class="card map">
<img <img src="https://maps.googleapis.com/maps/api/staticmap?center=52.823,-4.505&zoom=13&size=600x300&maptype=satellite">
<div id="windArrow" class="arrow wind">⬆️</div>
<div id="waveArrow" class="arrow wave">⬆️</div>
</div>

<div class="card">
<strong>🌊 Tide (24h)</strong>
<canvas id="tideChart"></canvas>
</div>

<div class="card">
<button class="btn" onclick="openWebcams()">📷 Live Cameras</button>
<button class="btn" onclick="toggleContacts()">📞 Useful Numbers</button>
</div>

<div class="card">
<strong>📅 5 Day Forecast</strong>
<div id="forecast"></div>
</div>

</div>

<div id="contacts" class="modal">
<h3>📞 Useful Numbers</h3>
<a href="tel:01758714100">Warren Reception</a>
<a href="tel:01758714190">Warren Security</a>
<a href="tel:01758714170">Warren Spa</a>
<a href="tel:01758714160">Warren Leisure</a>
<a href="tel:01758714150">Warren Sandbar</a>
<a href="tel:01407562051">Coastguard</a>
<a href="tel:01758712896">Crust Pizza</a>
<a href="tel:01758701219">Marina</a>
<a href="tel:01758431432">Potted Lobster</a>
<a href="tel:01758712338">Sailing Club & Cove</a>
<button class="btn" onclick="toggleContacts()">Close</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
async function loadData(){

const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=52.823&longitude=-4.505&hourly=temperature_2m,wind_speed_10m,wind_direction_10m,weathercode&current=temperature_2m,wind_speed_10m,wind_direction_10m,weathercode
const data = await res.json();

const temp = data.current.temperature_2m;
const windKmh = data.current.wind_speed_10m;
const windKnots = windKmh * 0.539957;
const windDir = data.current.wind_direction_10m;

// Fake wave direction for now (can upgrade later)
const waveDir = windDir;

// Rotate arrows
document.getElementById('windArrow').style.transform = `rotate(${windDir}deg)`;
document.getElementById('waveArrow').style.transform = `rotate(${waveDir}deg)`;

// Display

document.getElementById('temp').innerText = temp + '°C';
document.getElementById('wind').innerText = windKnots.toFixed(1);
const weatherMap = {
  0:"☀️ Clear",
  1:"🌤 Partly",
  2:"⛅ Cloudy",
  3:"☁️ Overcast",
  61:"🌧 Rain",
  80:"🌦 Showers"
};

document.getElementById('weather').innerText =
  weatherMap[data.current.weathercode] || "☁️";
document.getElementById('waves').innerText = '-';

let status = document.getElementById('status');
if(windKnots < 8){ status.innerText = '🟢 Good'; status.className='traffic good'; }
else if(windKnots < 15){ status.innerText = '🟡 OK'; status.className='traffic ok'; }
else { status.innerText = '🔴 Poor'; status.className='traffic bad'; }

// Tide chart
const labels = Array.from({length:24}, (_,i)=>i+':00');
const values = labels.map((_,i)=>Math.sin(i/24*2*Math.PI)*2+3);
new Chart(document.getElementById('tideChart'), {
  type: 'line',
  data: { labels: labels, datasets: [{ data: values }] },
  options: { plugins: { legend: { display:false } } }
});

}

function openWebcams(){ window.open('https://abersoch.com/abersoch-webcams/', '_blank'); }
function toggleContacts(){ document.getElementById('contacts').classList.toggle('open'); }

loadData();
</script>
</body>
</html>
